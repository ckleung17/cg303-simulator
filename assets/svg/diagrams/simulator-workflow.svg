<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" role="img" aria-labelledby="title desc">
  <title id="title">CG303 Fault Lab diagnostic workflow</title>
  <desc id="desc">Five stages: review the brief, isolate safely, test the circuit, diagnose all faults, then review the report. New scenarios return to the brief.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10z" fill="#829ab1"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#102a43" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1200" height="220" rx="18" fill="#f4f8fb"/>
  <g fill="none" stroke="#829ab1" stroke-width="4" marker-end="url(#arrow)">
    <path d="M218 105h40"/><path d="M454 105h40"/><path d="M690 105h40"/><path d="M926 105h40"/>
  </g>
  <g font-family="Arial, sans-serif" text-anchor="middle" filter="url(#shadow)">
    <g transform="translate(24 36)"><rect width="194" height="138" rx="14" fill="#fff" stroke="#9fb3c8"/><circle cx="97" cy="31" r="19" fill="#075ea8"/><text x="97" y="38" fill="#fff" font-size="20" font-weight="700">1</text><text x="97" y="78" fill="#102a43" font-size="20" font-weight="700">BRIEF</text><text x="97" y="103" fill="#526d82" font-size="14">Symptoms and records</text><text x="97" y="124" fill="#526d82" font-size="14">Form hypotheses</text></g>
    <g transform="translate(260 36)"><rect width="194" height="138" rx="14" fill="#fff" stroke="#9fb3c8"/><circle cx="97" cy="31" r="19" fill="#27864a"/><text x="97" y="38" fill="#fff" font-size="20" font-weight="700">2</text><text x="97" y="78" fill="#102a43" font-size="20" font-weight="700">SAFETY</text><text x="97" y="103" fill="#526d82" font-size="14">Identify and isolate</text><text x="97" y="124" fill="#526d82" font-size="14">Prove - dead - re-prove</text></g>
    <g transform="translate(496 36)"><rect width="194" height="138" rx="14" fill="#fff" stroke="#9fb3c8"/><circle cx="97" cy="31" r="19" fill="#d69e2e"/><text x="97" y="38" fill="#fff" font-size="20" font-weight="700">3</text><text x="97" y="78" fill="#102a43" font-size="20" font-weight="700">TEST</text><text x="97" y="103" fill="#526d82" font-size="14">Select instrument</text><text x="97" y="124" fill="#526d82" font-size="14">Collect evidence</text></g>
    <g transform="translate(732 36)"><rect width="194" height="138" rx="14" fill="#fff" stroke="#9fb3c8"/><circle cx="97" cy="31" r="19" fill="#7c3aed"/><text x="97" y="38" fill="#fff" font-size="20" font-weight="700">4</text><text x="97" y="78" fill="#102a43" font-size="20" font-weight="700">DIAGNOSE</text><text x="97" y="103" fill="#526d82" font-size="14">Identify every fault</text><text x="97" y="124" fill="#526d82" font-size="14">Recommend action</text></g>
    <g transform="translate(968 36)"><rect width="208" height="138" rx="14" fill="#102a43" stroke="#102a43"/><circle cx="104" cy="31" r="19" fill="#f7c948"/><text x="104" y="38" fill="#102a43" font-size="20" font-weight="700">5</text><text x="104" y="78" fill="#fff" font-size="20" font-weight="700">REPORT</text><text x="104" y="103" fill="#d9e2ec" font-size="14">Review score and gaps</text><text x="104" y="124" fill="#d9e2ec" font-size="14">Repeat or new scenario</text></g>
  </g>
</svg>
